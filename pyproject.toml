[project]
name = "fourier_toolkit"
dynamic = ["version"]
description = "Collection of utilities to compute Fourier sums."
readme = "README.rst"
authors = [
    { name = "Sepand KASHANI", email = "sepand@kashani.ch" }
]
urls.download = "https://github.com/SepandKashani/fourier_toolkit"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "finufft>=2.2.0",
    "numpy>=2.0.0",
    "opt-einsum>=3.4.0",
]

[build-system]
requires = [
    "hatchling",
    "hatch-vcs",
]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pre-commit>=4.6",
    "pytest>=9.0",
    "ruff>=0.15",
    "scipy>=1.17",
    "sphinx>=9.1",
    "sphinxcontrib-bibtex>=2.7",
    "ty>=0.0.30",
]

[tool.hatch.version]
source = "vcs"
